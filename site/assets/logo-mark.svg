<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Hanova Consultancy">
  <defs>
    <linearGradient id="navyGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#27466F"/>
      <stop offset="100%" stop-color="#16294A"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%"  stop-color="#159E80"/>
      <stop offset="100%" stop-color="#3FD9B4"/>
    </linearGradient>
  </defs>

  <!-- Left pillar (slight inward taper, like a book) -->
  <path d="M 48 24 L 80 28 L 80 168 L 48 172 Z" fill="url(#navyGrad)"/>
  <!-- Right pillar -->
  <path d="M 152 24 L 120 28 L 120 168 L 152 172 Z" fill="url(#navyGrad)"/>

  <!-- Curved teal crossbar (saddle) -->
  <path d="M 80 92 Q 100 116 120 92 L 120 108 Q 100 132 80 108 Z" fill="url(#tealGrad)"/>

  <!-- Growth arrow rising across the mark -->
  <path d="M 60 152
           L 78 130
           L 92 142
           L 110 110
           L 124 120
           L 148 78"
        fill="none" stroke="url(#tealGrad)" stroke-width="9"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Arrowhead -->
  <path d="M 138 70 L 158 68 L 154 88 Z" fill="#3FD9B4"/>
</svg>
